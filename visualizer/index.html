<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AoE2 Replay Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AoE2 Replay Visualizer</h1>
            <span id="match-info">Loading...</span>
        </header>

        <main>
            <div class="map-container" id="map-container">
                <canvas id="map-canvas"></canvas>
                <div class="zoom-controls">
                    <button id="zoom-in" title="Zoom In">+</button>
                    <span id="zoom-level">1x</span>
                    <button id="zoom-out" title="Zoom Out">-</button>
                </div>
            </div>

            <div class="controls-panel">
                <div class="playback-controls">
                    <button id="btn-start" title="Go to Start">|&lt;</button>
                    <button id="btn-step-back" title="Step Back">&lt;</button>
                    <button id="btn-play" title="Play/Pause">Play</button>
                    <button id="btn-step-forward" title="Step Forward">&gt;</button>
                    <button id="btn-end" title="Go to End">&gt;|</button>

                    <span class="time-display">
                        <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
                    </span>

                    <div class="speed-controls">
                        <button class="speed-btn" data-speed="1">1x</button>
                        <button class="speed-btn" data-speed="2">2x</button>
                        <button class="speed-btn" data-speed="4">4x</button>
                        <button class="speed-btn" data-speed="8">8x</button>
                    </div>
                </div>

                <div class="timeline-container">
                    <input type="range" id="timeline" min="0" max="100" value="0" step="0.1">
                </div>
            </div>

            <div class="info-panel">
                <div class="player-legend" id="player-legend">
                    <!-- Player colors populated by JS -->
                </div>

                <div class="action-log-container">
                    <h3>Action Log</h3>
                    <div class="action-log" id="action-log">
                        <!-- Actions populated by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="renderer.js"></script>
    <script src="playback.js"></script>
    <script src="app.js"></script>
</body>
</html>
